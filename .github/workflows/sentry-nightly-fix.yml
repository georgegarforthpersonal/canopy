name: Nightly Sentry Fix

on:
  schedule:
    - cron: "0 6 * * *" # 6am UTC daily
  workflow_dispatch: # Manual trigger for testing

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      issue_count: ${{ steps.sentry.outputs.issue_count }}
      issues: ${{ steps.sentry.outputs.issues }}
    steps:
      - name: Fetch Sentry issues and stack traces
        id: sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          # Fetch unresolved issues from last 24 hours
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
            "https://sentry.io/api/0/projects/${SENTRY_ORG}/${SENTRY_PROJECT}/issues/?query=is%3Aunresolved&statsPeriod=24h")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Sentry API status: ${HTTP_CODE}"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Sentry API error: ${BODY}"
            echo "issue_count=0" >> "$GITHUB_OUTPUT"
            echo "issues=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Take the top 5 issues with metadata
          ISSUES=$(echo "$BODY" | jq -c '[.[:5] | .[] | {id, title, culprit, count, level, link: .permalink}]')
          COUNT=$(echo "$ISSUES" | jq 'length')
          echo "issue_count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "Found ${COUNT} unresolved Sentry issues"

          if [ "$COUNT" = "0" ]; then
            echo "issues=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Enrich each issue with its latest event's stack trace
          for ISSUE_ID in $(echo "$ISSUES" | jq -r '.[].id'); do
            # Fetch latest event (org-scoped path; the bare /issues/{id}/ path 404s)
            EVENT_RESP=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
              "https://sentry.io/api/0/organizations/${SENTRY_ORG}/issues/${ISSUE_ID}/events/latest/")
            EVENT_CODE=$(echo "$EVENT_RESP" | tail -1)
            EVENT=$(echo "$EVENT_RESP" | sed '$d')
            echo "Event fetch for issue ${ISSUE_ID}: HTTP ${EVENT_CODE}"

            STACKTRACE=$(echo "$EVENT" | jq -c '[.entries[]? | select(.type=="exception") | .data.values[]? | {type: .type, value: .value, frames: [.stacktrace.frames[]? | {filename, function, lineNo, inApp: .inApp}]}]' 2>/dev/null || echo "[]")
            [ -z "$STACKTRACE" ] && STACKTRACE="[]"

            ISSUES=$(echo "$ISSUES" | jq -c --arg id "$ISSUE_ID" --argjson st "$STACKTRACE" \
              'map(if (.id|tostring) == $id then . + {stacktrace: $st} else . end)')
          done

          echo "issues=${ISSUES}" >> "$GITHUB_OUTPUT"

  fix:
    needs: discover
    if: needs.discover.outputs.issue_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        issue: ${{ fromJson(needs.discover.outputs.issues) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 40 --allowedTools 'Bash,Read,Write,Edit,Glob,Grep'"
          show_full_output: true
          prompt: |
            You are fixing a single bug in the Canopy Data wildlife monitoring platform (FastAPI + PostgreSQL).
            Source files are under app/backend/ in this repository.

            Below is one unresolved Sentry issue from the last 24 hours as JSON
            (title, culprit, occurrence count, level, link, and stack-trace frames):

            ${{ toJson(matrix.issue) }}

            Instructions:
            1. Read ONLY the source files referenced in the stack trace above.
            2. If you are confident a safe, correct fix exists, apply it. Do not attempt speculative fixes.
            3. If the issue is not safely fixable (e.g. an external/network error, needs a human decision, or is too complex), STOP without opening a PR and explain why in your final message.
            4. When you do fix it:
               - Create a branch named fix/sentry-${{ matrix.issue.id }}-${{ github.run_number }}
               - Commit with a clear message explaining what was fixed and why
               - Open a PR describing the Sentry link, root cause, what changed, and any caveats
            5. Only modify files directly implicated by the stack trace. Never push directly to main.
