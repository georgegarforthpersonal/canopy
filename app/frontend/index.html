<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/canopy-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Canopy</title>
    <script>
      // Tenant name in the tab title; the favicon and chrome are Canopy for
      // every organisation.
      (function() {
        var hostname = window.location.hostname;
        var org = 'heal';

        if (hostname === 'localhost' || hostname === '127.0.0.1') {
          var params = new URLSearchParams(window.location.search);
          org = params.get('org') || 'heal';
        } else {
          // New custom domain: {org}.canopydata.app / {org}.staging.canopydata.app
          var canopyMatch = hostname.match(/^([a-z]+)\.(?:staging\.)?canopydata\.app$/);
          // Legacy Railway: {org}data.up.railway.app or {org}data.{domain}
          var legacyMatch = hostname.match(/^([a-z]+)data\./);
          var match = canopyMatch || legacyMatch;
          if (match) org = match[1];
        }

        var orgNames = { heal: 'Heal', cannwood: 'Cannwood' };
        var displayName = orgNames[org] || org.charAt(0).toUpperCase() + org.slice(1);
        document.title = displayName + ' · Canopy';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
